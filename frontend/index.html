<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경기도 일자리맵 — 지도로 찾는 채용정보</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== 상단 헤더: 로고 + 검색바 ===== -->
  <header class="header">
    <div class="header__inner">
      <a href="#" class="logo">
        <span class="logo__pin" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
            <path d="M12 2C7.6 2 4 5.6 4 10c0 5.6 7 11.4 7.6 11.9a.6.6 0 0 0 .8 0C13 21.4 20 15.6 20 10c0-4.4-3.6-8-8-8z" fill="currentColor"/>
            <circle cx="12" cy="10" r="3.2" fill="#fff"/>
          </svg>
        </span>
        <span class="logo__text">경기도 일자리맵</span>
      </a>

      <form class="search" id="searchForm" role="search">
        <svg class="search__icon" viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="searchInput" class="search__input"
               placeholder="직무, 회사, 지역으로 검색 (예: 사무, 수원시)" autocomplete="off">
        <button type="submit" class="search__btn">검색</button>
      </form>
    </div>

    <!-- ===== 필터 칩 바 ===== -->
    <div class="filterbar">
      <div class="filterbar__inner" id="filterBar">
        <!-- 칩은 js/app.js 에서 FILTER_DEFS 기준으로 렌더링 -->
        <button type="button" class="filter-reset" id="filterReset" hidden>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" aria-hidden="true">
            <path d="M4 4v6h6M20 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M5.6 15A8 8 0 0 0 19 16.9M18.4 9A8 8 0 0 0 5 7.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          초기화
        </button>
      </div>
    </div>
  </header>

  <!-- ===== 본문: 좌측 리스트 + 우측 지도 ===== -->
  <main class="content">

    <!-- 좌측: 채용공고 리스트 -->
    <aside class="panel-list" id="panelList">
      <div class="list-head">
        <p class="list-head__count">채용공고 <strong id="resultCount">0</strong>건</p>
        <select class="list-head__sort" id="sortSelect" aria-label="정렬 기준">
          <option value="latest">최신 등록순</option>
          <option value="deadline">마감 임박순</option>
        </select>
      </div>

      <ul class="job-list" id="jobList"><!-- 카드 렌더링 영역 --></ul>

      <div class="list-empty" id="listEmpty" hidden>
        <p class="list-empty__title">검색 결과가 없습니다</p>
        <p class="list-empty__desc">검색어나 필터 조건을 변경해 보세요.</p>
      </div>
    </aside>

    <!-- 우측: 지도 영역 (카카오맵 SDK 연동 예정 — 현재는 자리만 표시) -->
    <section class="panel-map" id="panelMap">
      <div id="map" class="map-placeholder">
        <div class="map-placeholder__notice">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" aria-hidden="true">
            <path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M9 4v14M15 6v14" stroke="currentColor" stroke-width="1.6"/>
          </svg>
          <p><strong>카카오맵 영역</strong></p>
          <p class="map-placeholder__sub">SDK 연동 예정 — 아래 마커는 목데이터 미리보기입니다</p>
        </div>
        <div class="map-markers" id="mapMarkers"><!-- 임시 마커 렌더링 영역 --></div>
      </div>

      <!-- 지도 위 선택 공고 미니 카드 -->
      <div class="map-selected" id="mapSelected" hidden></div>
    </section>
  </main>

  <!-- 모바일: 리스트/지도 전환 버튼 -->
  <button type="button" class="view-toggle" id="viewToggle" data-view="list">
    지도 보기
  </button>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- config.js: scripts/apply-env.ps1 이 .env 에서 생성 (gitignore 대상, 템플릿은 config.example.js) -->
  <script src="js/config.js"></script>
  <!-- 카카오맵 SDK는 app.js 가 config 의 키로 동적 로드. 키 없음/도메인 미등록 시 플레이스홀더 폴백 -->
  <script src="js/jobs-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
