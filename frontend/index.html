<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경기도 일자리맵 — 지도로 찾는 채용정보</title>
  <link rel="stylesheet" href="css/style.css?v=20260708-4">
</head>
<body>

  <!-- #1 분양처 브랜딩 바 (위젯 임베드 시 URL 파라미터로 표시) -->
  <div class="brand-bar" id="brandBar" hidden>
    <img class="brand-bar__logo" id="brandLogo" alt="" hidden>
    <span class="brand-bar__name" id="brandName"></span>
    <span class="brand-bar__by">경기도 일자리맵 제공</span>
  </div>

  <!-- ===== 상단 헤더: 로고 + 검색바 ===== -->
  <header class="header">
    <div class="header__inner">
      <a href="#" class="logo">
        <span class="logo__pin" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
            <path d="M12 2C7.6 2 4 5.6 4 10c0 5.6 7 11.4 7.6 11.9a.6.6 0 0 0 .8 0C13 21.4 20 15.6 20 10c0-4.4-3.6-8-8-8z" fill="currentColor"/>
            <circle cx="12" cy="10" r="3.2" fill="#fff"/>
          </svg>
        </span>
        <span class="logo__text">경기도 일자리맵</span>
      </a>

      <form class="search" id="searchForm" role="search">
        <svg class="search__icon" viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="searchInput" class="search__input"
               placeholder="직무·회사·지역·주소 검색 (예: 사무, 수원시청)" autocomplete="off">
        <button type="submit" class="search__btn">검색</button>
        <!-- #5 최근 검색 드롭다운 -->
        <div class="search-recent" id="searchRecent" hidden></div>
      </form>
    </div>

    <!-- ===== 필터 칩 바 ===== -->
    <div class="filterbar">
      <div class="filterbar__inner" id="filterBar">
        <!-- 칩은 js/app.js 에서 FILTER_DEFS 기준으로 렌더링 -->
        <button type="button" class="filter-reset" id="filterReset" hidden>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" aria-hidden="true">
            <path d="M4 4v6h6M20 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M5.6 15A8 8 0 0 0 19 16.9M18.4 9A8 8 0 0 0 5 7.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          초기화
        </button>
      </div>
    </div>
  </header>

  <!-- ===== 본문: 좌측 리스트 + 우측 지도 ===== -->
  <main class="content">

    <!-- 좌측: 채용공고 리스트 -->
    <aside class="panel-list" id="panelList">
      <div class="list-head">
        <p class="list-head__count">채용공고 <strong id="resultCount">0</strong>건</p>
        <select class="list-head__sort" id="sortSelect" aria-label="정렬 기준">
          <option value="latest">최신 등록순</option>
          <option value="deadline">마감 임박순</option>
          <option value="distance">가까운 순</option>
        </select>
      </div>

      <ul class="job-list" id="jobList"><!-- 카드 렌더링 영역 --></ul>

      <div class="list-empty" id="listEmpty" hidden>
        <p class="list-empty__title">검색 결과가 없습니다</p>
        <p class="list-empty__desc">검색어나 필터 조건을 변경해 보세요.</p>
      </div>
    </aside>

    <!-- 우측: 지도 영역 (카카오맵 SDK 연동 예정 — 현재는 자리만 표시) -->
    <section class="panel-map" id="panelMap">
      <div id="map" class="map-placeholder">
        <div class="map-placeholder__notice">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" aria-hidden="true">
            <path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M9 4v14M15 6v14" stroke="currentColor" stroke-width="1.6"/>
          </svg>
          <p><strong>카카오맵 영역</strong></p>
          <p class="map-placeholder__sub">SDK 연동 예정 — 아래 마커는 목데이터 미리보기입니다</p>
        </div>
        <div class="map-markers" id="mapMarkers"><!-- 임시 마커 렌더링 영역 --></div>
      </div>

      <!-- 지도 우상단 컨트롤: 현재 위치 · 정책정보 -->
      <div class="map-ctrls">
        <button type="button" class="map-ctrl" id="btnLocate" title="현재 위치">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>현재 위치</span>
        </button>

        <div class="map-ctrl-wrap" id="policyWrap">
          <button type="button" class="map-ctrl" id="btnPolicy" title="일자리 정책 정보">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
              <path d="M12 3 4 6v6c0 4.5 3.4 7.9 8 9 4.6-1.1 8-4.5 8-9V6l-8-3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>정책정보</span>
          </button>
          <div class="policy-menu" id="policyMenu" hidden>
            <p class="policy-menu__head">경기도 일자리 지원정책</p>
            <a href="https://www.jobaba.net/policy/list.do" target="_blank" rel="noopener">청년 취업지원 정책 ↗</a>
            <a href="https://www.jobaba.net/edu/list.do" target="_blank" rel="noopener">직업훈련 · 교육 ↗</a>
            <a href="https://www.jobaba.net/startup/list.do" target="_blank" rel="noopener">창업 지원 ↗</a>
            <a href="https://www.jobaba.net" target="_blank" rel="noopener">잡아바 일자리 플랫폼 ↗</a>
          </div>
        </div>
      </div>

      <!-- 지도 확대·축소 -->
      <div class="map-zoom-controls" id="mapZoomControls" hidden aria-label="지도 확대 및 축소">
        <button type="button" id="btnZoomIn" title="지도 확대" aria-label="지도 확대">+</button>
        <button type="button" id="btnZoomOut" title="지도 축소" aria-label="지도 축소">−</button>
      </div>

      <!-- 지도 위 선택 공고 미니 카드 -->
      <div class="map-selected" id="mapSelected" hidden></div>

      <!-- 위치 동의 안내 (최초 현재위치 클릭 시) -->
      <div class="geo-consent" id="geoConsent" hidden>
        <p class="geo-consent__text">현재 위치를 사용하려면 브라우저의 <strong>위치 정보 접근 허용</strong>이 필요합니다. 위치 정보는 지도 표시·주변 공고 정렬에만 사용되며 저장되지 않습니다.</p>
        <div class="geo-consent__btns">
          <button type="button" id="geoAgree" class="geo-consent__ok">위치 사용</button>
          <button type="button" id="geoCancel" class="geo-consent__no">취소</button>
        </div>
      </div>
    </section>
  </main>

  <!-- 모바일: 리스트/지도 전환 버튼 -->
  <button type="button" class="view-toggle" id="viewToggle" data-view="list">
    지도 보기
  </button>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- config.js: 로컬은 scripts/apply-env.ps1, 운영은 nginx 가 .env/환경변수로 생성 (gitignore 대상) -->
  <script src="js/config.js"></script>
  <!-- 채용공고는 app.js 가 config.apiBase + /api/jobs 로 조회. 카카오 SDK 도 config 키로 동적 로드 -->
  <script src="js/app.js?v=20260708-4"></script>
</body>
</html>
