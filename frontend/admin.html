<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경기도 일자리맵 — 관리자 통계</title>
  <link rel="stylesheet" href="css/style.css?v=20260709-5">
  <link rel="stylesheet" href="css/admin.css?v=20260709-5">
</head>
<body class="admin">

  <header class="admin-header">
    <div class="admin-header__inner">
      <a href="index.html" class="logo">
        <span class="logo__pin" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
            <path d="M12 2C7.6 2 4 5.6 4 10c0 5.6 7 11.4 7.6 11.9a.6.6 0 0 0 .8 0C13 21.4 20 15.6 20 10c0-4.4-3.6-8-8-8z" fill="currentColor"/>
            <circle cx="12" cy="10" r="3.2" fill="#fff"/>
          </svg>
        </span>
        <span class="logo__text">경기도 일자리맵</span>
      </a>
      <span class="admin-header__tag">관리자 통계</span>
      <button type="button" class="admin-header__logout" id="logoutBtn" hidden>로그아웃</button>
      <a href="index.html" class="admin-header__back">← 지도 화면</a>
    </div>
  </header>

  <main class="admin-main" id="adminMain">

    <!-- 로그인 폼 (미인증 시 표시) -->
    <section class="admin-login" id="loginBox" hidden>
      <h1 class="admin-login__title">관리자 로그인</h1>
      <p class="admin-login__desc">통계 조회는 관리자 인증이 필요합니다.</p>
      <form id="loginForm" class="admin-login__form" autocomplete="off">
        <label class="admin-login__field">
          <span>아이디</span>
          <input type="text" id="loginUser" autocomplete="username" required>
        </label>
        <label class="admin-login__field">
          <span>비밀번호</span>
          <input type="password" id="loginPass" autocomplete="current-password" required>
        </label>
        <p class="admin-login__error" id="loginError" hidden>아이디 또는 비밀번호가 올바르지 않습니다.</p>
        <button type="submit" class="admin-login__submit" id="loginSubmit">로그인</button>
      </form>
    </section>

    <!-- 통계 (인증 후 표시) -->
    <div class="admin-stats" id="statsWrap" hidden>
      <div class="admin-summary">
        <div class="admin-summary__card">
          <span>전체 적재 공고</span>
          <strong id="totalCount">–</strong>
          <em>원본 정제 후 DB 적재 기준</em>
        </div>
        <div class="admin-summary__card admin-summary__card--active">
          <span>현재 지도 노출</span>
          <strong id="activeCount">–</strong>
          <em>마감 공고 제외</em>
        </div>
        <div class="admin-summary__card admin-summary__card--expired">
          <span>마감 공고</span>
          <strong id="expiredCount">–</strong>
          <em id="statsDate">기준일 –</em>
        </div>
      </div>
      <div class="admin-grid" id="statsGrid"></div>

      <section class="job-admin">
        <div class="job-admin__head">
          <div>
            <h2>채용공고 관리</h2>
            <p>운영 DB의 채용공고를 등록·수정·삭제합니다.</p>
          </div>
          <button type="button" class="job-admin__primary" id="jobCreateBtn">공고 등록</button>
        </div>
        <form class="job-admin__search" id="jobSearchForm">
          <input type="search" id="jobSearchInput" placeholder="제목·회사·지역 검색">
          <button type="submit">검색</button>
        </form>
        <div class="job-admin__table-wrap">
          <table class="job-admin__table">
            <thead>
              <tr>
                <th>ID</th>
                <th>출처</th>
                <th>제목</th>
                <th>회사</th>
                <th>지역</th>
                <th>마감</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="jobAdminRows"></tbody>
          </table>
        </div>
        <div class="job-admin__pager">
          <button type="button" id="jobPrevBtn">이전</button>
          <span id="jobPageInfo">–</span>
          <button type="button" id="jobNextBtn">다음</button>
        </div>
      </section>
    </div>

    <div class="admin-state" id="adminState" hidden>불러오는 중…</div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/config.js"></script>
  <div class="admin-modal" id="jobFormModal" hidden>
    <form class="admin-modal__box" id="jobForm">
      <div class="admin-modal__head">
        <h2 id="jobFormTitle">채용공고 등록</h2>
        <button type="button" id="jobFormClose" aria-label="닫기">×</button>
      </div>
      <input type="hidden" id="jobId">
      <div class="admin-form-grid">
        <label>출처
          <select id="jobSource" required>
            <option value="private">잡코리아</option>
            <option value="public">고용24</option>
          </select>
        </label>
        <label>회사명<input id="jobCompany" required></label>
        <label class="admin-form-grid--wide">제목<input id="jobTitleInput" required></label>
        <label>지역<input id="jobRegion" required></label>
        <label>주소/지역 원문<input id="jobAddressRaw" required></label>
        <label>경력
          <select id="jobCareer">
            <option>무관</option><option>신입</option><option>경력</option>
          </select>
        </label>
        <label>학력
          <select id="jobEducation">
            <option>무관</option><option>고졸 이상</option><option>대졸 이상</option>
          </select>
        </label>
        <label>고용형태
          <select id="jobEmpType">
            <option>정규직</option><option>계약직</option><option>파트타임</option>
          </select>
        </label>
        <label>직종<input id="jobCategory" value="기타"></label>
        <label>임금<input id="jobSalary" value="회사 내규에 따름"></label>
        <label>최소연봉(만원)<input id="jobSalaryMin" type="number" min="0"></label>
        <label>등록일<input id="jobPostedAt" type="date"></label>
        <label>마감일<input id="jobDeadline" type="date"></label>
        <p class="admin-form-grid--wide admin-form-help">
          좌표는 저장 시 주소/지역 기준으로 자동 생성됩니다. 주소 지오코딩이 실패하면 지역 중심점으로 보정됩니다.
        </p>
        <label>사업자번호<input id="jobBizNo" maxlength="10"></label>
        <label class="admin-form-grid--wide">원문 URL<input id="jobUrl" type="url" required></label>
      </div>
      <p class="admin-modal__error" id="jobFormError" hidden></p>
      <div class="admin-modal__actions">
        <button type="button" id="jobFormCancel">취소</button>
        <button type="submit">저장</button>
      </div>
    </form>
  </div>

  <script src="js/admin.js?v=20260709-5"></script>
</body>
</html>
